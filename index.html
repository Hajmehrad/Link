<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hajmehrad · Developer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Vazirmatn:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --s1: #0f0f18;
      --s2: #13131f;
      --accent: #e8d5b7;
      --accent2: #c9a96e;
      --accent3: #8b7355;
      --text: #e2ddd6;
      --muted: #6b6660;
      --border: rgba(232,213,183,0.08);
      --border2: rgba(232,213,183,0.14);
      --glow: rgba(201,169,110,0.12);
    }

    html { height: 100%; }

    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      position: relative;
      overflow-x: hidden;
    }

    /* ─── Animated background ─── */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    /* Slow orbiting gradient blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.35;
      animation: drift linear infinite;
    }
    .blob-1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, #3d2a08 0%, #1a1000 50%, transparent 70%);
      top: -250px; left: -250px;
      animation-duration: 14s;
      opacity: 0.55;
    }
    .blob-2 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #081828 0%, #040e1a 50%, transparent 70%);
      bottom: -200px; right: -200px;
      animation-duration: 18s;
      animation-direction: reverse;
      opacity: 0.5;
    }
    .blob-3 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #1e0a2e 0%, #0e0516 50%, transparent 70%);
      top: 35%; left: 45%;
      animation-duration: 11s;
      opacity: 0.4;
    }
    .blob-4 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, #2a1200 0%, transparent 70%);
      top: 60%; left: 10%;
      animation-duration: 16s;
      opacity: 0.35;
    }
    @keyframes drift {
      0%   { transform: translate(0,0) rotate(0deg); }
      25%  { transform: translate(60px,80px) rotate(90deg); }
      50%  { transform: translate(-40px,50px) rotate(180deg); }
      75%  { transform: translate(50px,-30px) rotate(270deg); }
      100% { transform: translate(0,0) rotate(360deg); }
    }

    /* Grid overlay */
    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,213,183,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,213,183,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Noise texture */
    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ─── Card ─── */
    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      opacity: 0;
      transform: translateY(24px);
      animation: rise 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
    }
    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Header ─── */
    .header {
      margin-bottom: 2.5rem;
    }

    .eyebrow {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent3);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .eyebrow::before {
      content: '';
      display: block;
      width: 24px; height: 1px;
      background: var(--accent3);
    }

    .name-wrap {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.2rem, 8vw, 2.8rem);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: var(--accent);
      text-shadow: 0 0 60px rgba(201,169,110,0.2);
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--border2);
      border-radius: 100px;
      white-space: nowrap;
      margin-bottom: 0.2rem;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.02);
    }
    .live-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      animation: livepulse 2s ease-in-out infinite;
    }
    @keyframes livepulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .tagline {
      margin-top: 1rem;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.9;
      max-width: 320px;
      font-weight: 300;
      font-family: 'Vazirmatn', 'DM Mono', sans-serif;
      direction: rtl;
      text-align: right;
    }
    .tagline em {
      color: var(--accent2);
      font-style: normal;
    }

    /* ─── Divider ─── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border2) 30%, var(--border2) 70%, transparent);
      margin: 1.8rem 0;
    }

    /* ─── Stack chips ─── */
    .stack-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-bottom: 2rem;
    }

    .chip {
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--accent3);
      background: rgba(232,213,183,0.03);
      transition: all 0.25s;
    }
    .chip:hover {
      border-color: var(--accent3);
      color: var(--accent2);
      background: rgba(232,213,183,0.06);
    }

    /* ─── Links ─── */
    .links { display: flex; flex-direction: column; gap: 0.7rem; }

    .link-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.2rem;
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: linear-gradient(135deg, rgba(255,255,255,0.025), rgba(255,255,255,0.01));
      backdrop-filter: blur(8px);
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
      overflow: hidden;
      group: true;
    }

    .link-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--glow), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .link-item::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, transparent, var(--accent2), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .link-item:hover {
      border-color: var(--border2);
      transform: translateX(4px) translateY(-1px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(232,213,183,0.06);
    }
    .link-item:hover::before { opacity: 1; }
    .link-item:hover::after { opacity: 1; }

    .link-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: rgba(232,213,183,0.05);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.3s;
    }
    .link-item:hover .link-icon {
      background: rgba(232,213,183,0.09);
      border-color: var(--accent3);
    }

    .link-icon svg { width: 16px; height: 16px; fill: var(--accent2); }

    .link-info { flex: 1; min-width: 0; }
    .link-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.01em;
    }
    .link-sub {
      font-size: 0.6rem;
      color: var(--muted);
      margin-top: 0.15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-arrow {
      color: var(--muted);
      font-size: 0.9rem;
      transition: all 0.25s;
      flex-shrink: 0;
    }
    .link-item:hover .link-arrow {
      color: var(--accent2);
      transform: translateX(3px);
    }

    /* ─── Footer ─── */
    .footer {
      margin-top: 2.2rem;
      text-align: center;
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
    .footer span {
      display: inline-block;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent3);
      margin: 0 0.5rem;
      vertical-align: middle;
      opacity: 0.5;
    }

    /* stagger children */
    .link-item:nth-child(1) { animation: rise 0.6s cubic-bezier(0.22,1,0.36,1) 0.5s both; }
    .link-item:nth-child(2) { animation: rise 0.6s cubic-bezier(0.22,1,0.36,1) 0.62s both; }
    .link-item:nth-child(3) { animation: rise 0.6s cubic-bezier(0.22,1,0.36,1) 0.74s both; }
    .link-item:nth-child(4) { animation: rise 0.6s cubic-bezier(0.22,1,0.36,1) 0.86s both; }
  </style>
</head>
