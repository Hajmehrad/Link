<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hajmehrad · Developer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Vazirmatn:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #070710;
      --accent: #e8d5b7;
      --accent2: #c9a96e;
      --accent3: #7a6340;
      --muted: #5a5450;
      --border: rgba(232,213,183,0.08);
      --border2: rgba(232,213,183,0.16);
      --glow: rgba(201,169,110,0.1);
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      font-family: 'DM Mono', monospace;
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── Background ── */
    .bg-layer { position: fixed; inset: 0; z-index: 0; overflow: hidden; }

    .blob {
      position: absolute; border-radius: 50%;
      filter: blur(120px);
      animation: drift linear infinite;
    }
    .blob-1 {
      width: 800px; height: 800px;
      background: radial-gradient(circle, #3d2a08 0%, #1c1200 45%, transparent 70%);
      top: -300px; left: -300px;
      animation-duration: 14s; opacity: 0.6;
    }
    .blob-2 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, #081828 0%, #03080f 45%, transparent 70%);
      bottom: -250px; right: -250px;
      animation-duration: 18s; animation-direction: reverse; opacity: 0.55;
    }
    .blob-3 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #200a30 0%, #0e0516 45%, transparent 70%);
      top: 30%; left: 40%;
      animation-duration: 11s; opacity: 0.45;
    }
    .blob-4 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #2a1400 0%, transparent 70%);
      top: 55%; left: 5%;
      animation-duration: 16s; opacity: 0.4;
    }
    @keyframes drift {
      0%   { transform: translate(0,0) rotate(0deg); }
      25%  { transform: translate(70px,90px) rotate(90deg); }
      50%  { transform: translate(-50px,60px) rotate(180deg); }
      75%  { transform: translate(60px,-40px) rotate(270deg); }
      100% { transform: translate(0,0) rotate(360deg); }
    }
    .grid-overlay {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(232,213,183,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,213,183,0.02) 1px, transparent 1px);
      background-size: 72px 72px;
    }
    .noise {
      position: absolute; inset: 0; opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ── Page shell ── */
    .page {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* ── DESKTOP layout ── */
    @media (min-width: 860px) {
      .page {
        display: grid;
        grid-template-columns: 1fr 1px 1fr;
        grid-template-rows: 1fr auto;
        grid-template-areas:
          "left divv right"
          "foot foot foot";
        min-height: 100vh;
      }
      .left-col  { grid-area: left;  display: flex; flex-direction: column; justify-content: center; padding: 5rem 5rem 4rem 6rem; }
      .vert-div  { grid-area: divv;  background: linear-gradient(180deg, transparent 5%, var(--border2) 30%, var(--border2) 70%, transparent 95%); margin: 3rem 0; }
      .right-col { grid-area: right; display: flex; flex-direction: column; justify-content: center; padding: 5rem 6rem 4rem 5rem; gap: 0.8rem; }
      .footer    { grid-area: foot; }
      .mobile-divider { display: none; }
    }

    /* ── MOBILE layout ── */
    @media (max-width: 859px) {
      .page { padding: 3rem 1.4rem 2rem; gap: 2rem; }
      .left-col { }
      .vert-div { display: none; }
      .right-col { display: flex; flex-direction: column; gap: 0.65rem; }
      .mobile-divider {
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--border2) 30%, var(--border2) 70%, transparent);
      }
    }

    /* ── Left col ── */
    .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--accent3);
      display: flex; align-items: center; gap: 0.7rem;
      margin-bottom: 1.4rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.1s forwards;
    }
    .eyebrow::before {
      content: '';
      display: block; width: 28px; height: 1px;
      background: var(--accent3);
    }

    .name-block {
      margin-bottom: 1.6rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.25s forwards;
    }

    /* Big display name */
    .name-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 13vw, 9rem);
      line-height: 0.88;
      letter-spacing: 0.04em;
      color: var(--accent);
      text-shadow:
        0 0 80px rgba(201,169,110,0.25),
        0 2px 0 rgba(0,0,0,0.5);
      display: block;
      /* subtle gradient on text */
      background: linear-gradient(160deg, #f0dfc0 0%, #c9a96e 55%, #8b6030 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .badge-row {
      display: flex; align-items: center; gap: 0.7rem;
      margin-top: 0.6rem;
    }
    .live-badge {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.58rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted);
      padding: 0.3rem 0.75rem;
      border: 1px solid var(--border2); border-radius: 100px;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.02);
    }
    .live-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #4ade80; box-shadow: 0 0 7px #4ade80;
      animation: livepulse 2s ease-in-out infinite;
    }
    @keyframes livepulse {
      0%,100%{ opacity:1; transform:scale(1); }
      50%    { opacity:0.4; transform:scale(0.75); }
    }

    .tagline {
      font-size: 0.82rem; color: var(--muted); line-height: 2;
      font-family: 'Vazirmatn', sans-serif;
      direction: rtl; text-align: right;
      max-width: 340px;
      opacity: 0;
      animation: fadeUp 0.7s 0.4s forwards;
    }
    .tagline em { color: var(--accent2); font-style: normal; }

    .stack-row {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
      margin-top: 1.6rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.55s forwards;
    }
    .chip {
      font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 0.35rem 0.85rem;
      border: 1px solid var(--border); border-radius: 3px;
      color: var(--accent3); background: rgba(232,213,183,0.03);
      transition: all 0.25s; cursor: default;
    }
    .chip:hover {
      border-color: var(--accent3); color: var(--accent2);
      background: rgba(232,213,183,0.07);
    }

    /* ── Right col / Links ── */
    .section-label {
      font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--accent3); margin-bottom: 0.6rem;
      opacity: 0; animation: fadeUp 0.6s 0.5s forwards;
    }

    .link-item {
      display: flex; align-items: center; gap: 1rem;
      padding: 1rem 1.3rem;
      text-decoration: none;
      border: 1px solid var(--border); border-radius: 8px;
      background: linear-gradient(135deg, rgba(255,255,255,0.028), rgba(255,255,255,0.008));
      transition: border-color 0.4s ease, box-shadow 0.4s ease, background 0.4s ease;
      position: relative; overflow: hidden;
      will-change: border-color, box-shadow;
    }
    .link-item::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--glow), transparent);
      opacity: 0; transition: opacity 0.45s ease;
    }
    .link-item::after {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 2px;
      background: linear-gradient(180deg, transparent, var(--accent2), transparent);
      opacity: 0; transition: opacity 0.45s ease;
    }
    .link-item:hover {
      border-color: var(--border2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 0 0 1px rgba(232,213,183,0.06);
      background: linear-gradient(135deg, rgba(255,255,255,0.042), rgba(255,255,255,0.012));
    }
    .link-item:hover::before { opacity: 1; }
    .link-item:hover::after  { opacity: 1; }

    .link-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: rgba(232,213,183,0.05);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.4s ease, border-color 0.4s ease;
    }
    .link-item:hover .link-icon {
      background: rgba(232,213,183,0.1); border-color: var(--accent3);
    }
    .link-icon svg { width: 18px; height: 18px; fill: var(--accent2); }

    .link-info { flex: 1; min-width: 0; }
    .link-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem; font-weight: 500;
      color: var(--accent); letter-spacing: 0.03em;
    }
    .link-sub {
      font-size: 0.62rem; color: var(--muted); margin-top: 0.18rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .link-arrow {
      color: var(--muted); font-size: 1rem;
      transition: color 0.4s ease, transform 0.4s ease; flex-shrink: 0;
    }
    .link-item:hover .link-arrow { color: var(--accent2); transform: translateX(3px); }

    /* stagger links */
    .link-item:nth-child(1) { opacity:0; animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.55s forwards; }
    .link-item:nth-child(2) { opacity:0; animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.68s forwards; }
    .link-item:nth-child(3) { opacity:0; animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.81s forwards; }
    .link-item:nth-child(4) { opacity:0; animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.94s forwards; }

    /* ── Footer ── */
    .footer {
      text-align: center; padding: 1.2rem;
      font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em;
      border-top: 1px solid var(--border);
      opacity: 0; animation: fadeUp 0.6s 1s forwards;
    }
    .footer span {
      display: inline-block; width: 3px; height: 3px; border-radius: 50%;
      background: var(--accent3); margin: 0 0.6rem; vertical-align: middle; opacity: 0.5;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
